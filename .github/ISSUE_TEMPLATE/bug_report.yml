name: Bug report
description: Report something that isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! ⚠️ Please do **not** paste secrets or personal data
        (IPs, hostnames, SSH keys, real session paths). Redact before posting.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard UI
        - server.py / API
        - enrich.py / data collection
        - install / host onboarding
        - other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS (of the machine running cc-cockpit)
      placeholder: e.g. macOS 15.5 / Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: pyver
    attributes:
      label: Python version
      placeholder: python3 --version
    validations:
      required: true
  - type: input
    id: ccver
    attributes:
      label: Claude Code version
      placeholder: claude --version
    validations:
      required: false
  - type: dropdown
    id: hosts
    attributes:
      label: Host setup
      options:
        - local only
        - local + remote (SSH)
        - demo mode (CC_DEMO=1)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "From ~/.local/share/cc-cockpit/server.log — redact anything sensitive."
      render: text
    validations:
      required: false
